            color: white;
            border: none;
            padding: 13px 22px;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-row {

            gap: 10px;

            flex-wrap: wrap;
        }

        .search-row input {
            width: 330px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #f0d7cc;
            background: white;

        .filter {

        .card {

function renderProducts() {

function saveProduct() {
    const ma = document.getElementById("maBanh").value.trim();
    const ten = document.getElementById("tenBanh").value.trim();
    const loai = document.getElementById("loaiBanh").value;
    const gia = Number(document.getElementById("giaBan").value);
    const ton = Number(document.getElementById("tonKho").value);
    const moTa = document.getElementById("moTa").value.trim();
    const img = document.getElementById("hinhAnhBanh").value.trim();

    if (ma === "" || ten === "" || gia <= 0 || ton < 0) {
        alert("Vui lòng nhập đầy đủ thông tin bánh");
        return;
    }

    const isExist = products.some(p => p.ma === ma);

    if (isExist) {
        alert("Mã bánh đã tồn tại");
        return;
    }

   products.push({
    ma: ma,
    ten: ten,
    loai: loai,
    gia: gia,
    ton: ton,
    moTa: moTa,
    trangThai: ton > 0 ? "Còn hàng" : "Hết hàng",
    img: img || "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=800"
});

localStorage.setItem("products", JSON.stringify(products));
    closeProductModal();
    renderProducts();
    alert("Thêm bánh mới thành công");
}

function deleteProduct(ma) {
    const confirmDelete = confirm("Bạn có chắc muốn xóa bánh này không?");

    if (!confirmDelete) return;

    products = products.filter(p => p.ma !== ma);
    renderProducts();
}

function editProduct(ma) {
    const product = products.find(p => p.ma === ma);

    if (!product) return;

    const tenMoi = prompt("Nhập tên bánh mới:", product.ten);
    const giaMoi = prompt("Nhập giá bán mới:", product.gia);
    const tonMoi = prompt("Nhập số lượng tồn mới:", product.ton);

    if (tenMoi === null || giaMoi === null || tonMoi === null) return;

    product.ten = tenMoi;
    product.gia = Number(giaMoi);
    product.ton = Number(tonMoi);
    product.trangThai = product.ton > 0 ? "Còn hàng" : "Hết hàng";

    renderProducts();
}

function formatMoney(number) {
    return Number(number).toLocaleString("vi-VN") + "đ";

function loadOrderTable() {
    const tbody = document.getElementById("orderTableBody");
    const searchInput = document.getElementById("searchOrder");
    const keyword = searchInput ? searchInput.value.toLowerCase() : "";

    let filteredOrders = orders;

    if (currentOrderFilter !== "Tất cả") {
    filteredOrders = filteredOrders.filter(o => o.trangThai === currentOrderFilter);
    }

    if (keyword !== "") {
        filteredOrders = filteredOrders.filter(o =>
            o.ma.toLowerCase().includes(keyword) ||
            o.khach.toLowerCase().includes(keyword) ||
            o.sdt.includes(keyword)
        );
    }

    if (filteredOrders.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="8" style="text-align:center; padding:25px; color:#9b6a5a;">
                    Không có đơn hàng phù hợp
                </td>
            </tr>
        `;
        return;
    }

    tbody.innerHTML = filteredOrders.map(o => `
        <tr>
            <td>${o.ma}</td>
            <td><b>${o.khach}</b></td>
            <td>${o.sdt}</td>
            <td>${o.ngay}</td>
            <td>${o.sanPham}</td>
            <td class="price">${formatMoney(o.tongTien)}</td>
            <td>
                <span class="status ${getOrderStatusClass(o.trangThai)}">
                    ${o.trangThai}
                </span>
            </td>
            <td>
                <button class="action-btn edit" onclick="xemOrder('${o.ma}')">Xem</button>
                <button class="action-btn delete" onclick="deleteOrder('${o.ma}')">Xóa</button>
            </td>
        </tr>
    `).join("");
}

function openOrderModal() {
    document.getElementById("orderModal").style.display = "flex";

function closeOrderModal() {
    document.getElementById("orderModal").style.display = "none";

    document.getElementById("sanPhamDon").selectedIndex = 0;
    document.getElementById("soLuongDon").value = 1;
    document.getElementById("trangThaiDon").value = "Chờ xác nhận";
    capNhatGiaDonHang();
}

function capNhatGiaDonHang() {
    const select = document.getElementById("sanPhamDon");
    const selectedOption = select.options[select.selectedIndex];
    const gia = Number(selectedOption.getAttribute("data-price"));
    const soLuong = Number(document.getElementById("soLuongDon").value);

    const tongTien = gia * soLuong;

    document.getElementById("tongTienDon").value = formatMoney(tongTien);
}

    const sdt = document.getElementById("sdtKhach").value.trim();
    const select = document.getElementById("sanPhamDon");
    const sanPham = select.value;
    const gia = Number(select.options[select.selectedIndex].getAttribute("data-price"));
    const soLuong = Number(document.getElementById("soLuongDon").value);
    const trangThai = document.getElementById("trangThaiDon").value;

    if (ma === "" || khach === "" || sdt === "" || soLuong <= 0) {

        String(today.getMonth() + 1).padStart(2, "0") + "/" +
        today.getFullYear();

    document.getElementById("chucVuNV").value = "Quản lý cửa hàng";
    document.getElementById("sdtNV").value = "";
    document.getElementById("emailNV").value = "";
    document.getElementById("ngayVaoLamNV").value = "";
    document.getElementById("luongNV").value = "";
    document.getElementById("trangThaiNV").value = "Đang làm việc";
}

function saveEmployee() {
    const ma = document.getElementById("maNV").value.trim();
    const hoTen = document.getElementById("hoTenNV").value.trim();
    const chucVu = document.getElementById("chucVuNV").value;
    const sdt = document.getElementById("sdtNV").value.trim();
    const email = document.getElementById("emailNV").value.trim();
    const ngayInput = document.getElementById("ngayVaoLamNV").value;
    const luong = Number(document.getElementById("luongNV").value);
    const trangThai = document.getElementById("trangThaiNV").value;

    if (ma === "" || hoTen === "" || sdt === "" || email === "" || ngayInput === "" || luong <= 0) {
        alert("Vui lòng nhập đầy đủ thông tin nhân viên");
        return;
    }

    const isExist = employees.some(e => e.ma === ma);

    if (isExist) {
        alert("Mã nhân viên đã tồn tại");
        return;
    }

    const parts = ngayInput.split("-");
    const ngayVaoLam = `${parts[2]}/${parts[1]}/${parts[0]}`;

    employees.push({
        ma: ma,
        hoTen: hoTen,
        chucVu: chucVu,
        sdt: sdt,
        email: email,
        ngayVaoLam: ngayVaoLam,
        luong: luong,
        trangThai: trangThai
    });

    saveEmployeesToLocal();
    closeEmployeeModal();
    renderEmployees();

    alert("Thêm nhân viên thành công");
}

function deleteEmployee(ma) {
    const confirmDelete = confirm("Bạn có chắc muốn xóa nhân viên này không?");

    if (!confirmDelete) return;

    employees = employees.filter(e => e.ma !== ma);
    saveEmployeesToLocal();
    renderEmployees();
}

function editEmployee(ma) {
    const employee = employees.find(e => e.ma === ma);

    if (!employee) return;

    const hoTenMoi = prompt("Nhập họ tên mới:", employee.hoTen);
    const sdtMoi = prompt("Nhập số điện thoại mới:", employee.sdt);
    const luongMoi = prompt("Nhập lương mới:", employee.luong);

    if (hoTenMoi === null || sdtMoi === null || luongMoi === null) return;

    employee.hoTen = hoTenMoi;
    employee.sdt = sdtMoi;
    employee.luong = Number(luongMoi);

    saveEmployeesToLocal();
    renderEmployees();
}

function getEmployeeStatusClass(status) {
    if (status === "Đang làm việc") return "green";
    if (status === "Nghỉ phép") return "yellow";
    return "blue";
}
